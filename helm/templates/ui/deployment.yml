apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-deployment


spec:
  replicas: {{ .Values.ui.replicas }}

  selector:
    matchLabels:
      app: todoui

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: todoui

    spec:
      containers:
      - name: mynginx
        image: {{ .Values.ui.image }}
        ports:
         - containerPort: 80
